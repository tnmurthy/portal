[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --disable-warnings
    --cov=brain
    --cov=orchestrator
    --cov-report=term-missing
markers =
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    slow: marks tests as slow
